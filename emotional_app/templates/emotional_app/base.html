{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}EmoFlow{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{% static 'emotional_app/css/style.css' %}">
</head>
<body>

<header class="site-header">
    <a href="{% url 'home' %}" class="site-logo">EmoFlow</a>

    <nav class="site-nav">
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}">Программа</a>
            <a href="{% url 'progress' %}">Прогресс</a>

            <form method="post" action="{% url 'logout' %}" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="nav-button logout-button">
                    Выйти
                </button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Вход</a>
            <a href="{% url 'register' %}" class="nav-button">Регистрация</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
